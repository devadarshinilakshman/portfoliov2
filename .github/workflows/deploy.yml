name: Portfolio Deployment

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Validate Code Quality

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate HTML
        run: |
          echo "Validating HTML files..."
          # Check for basic HTML structure
          if grep -q "<!DOCTYPE html>" index.html; then
            echo "✓ HTML structure is valid"
          else
            echo "✗ HTML structure is missing"
            exit 1
          fi

      - name: Check CSS syntax
        run: |
          echo "Checking CSS syntax..."
          # Basic CSS validation
          if grep -q "}" styles.css; then
            echo "✓ CSS file structure looks valid"
          else
            echo "✗ CSS file may have syntax issues"
            exit 1
          fi

      - name: Validate JavaScript
        run: |
          echo "Validating JavaScript..."
          # Check if JavaScript file has proper structure
          if grep -q "document\." script.js; then
            echo "✓ JavaScript structure looks valid"
          else
            echo "✗ JavaScript may have issues"
            exit 1
          fi

  accessibility:
    runs-on: ubuntu-latest
    name: Check Accessibility

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for alt text in images
        run: |
          echo "Checking for alt text in images..."
          # Count images without alt text
          missing_alt=$(grep -o '<img[^>]*>' index.html | grep -c 'alt=""' || echo "0")
          if [ "$missing_alt" -eq 0 ]; then
            echo "✓ All images have alt text"
          else
            echo "⚠ Found $missing_alt images without proper alt text"
          fi

      - name: Check for semantic HTML
        run: |
          echo "Checking semantic HTML usage..."
          if grep -q "<section" index.html && grep -q "<nav" index.html && grep -q "<footer" index.html; then
            echo "✓ Semantic HTML tags are in use"
          else
            echo "✗ Missing semantic HTML tags"
            exit 1
          fi

      - name: Check for form labels
        run: |
          echo "Checking form accessibility..."
          if grep -q "for=" index.html || grep -q "placeholder=" index.html; then
            echo "✓ Form elements have labels or placeholders"
          else
            echo "⚠ Consider adding labels to form elements"
          fi

  performance:
    runs-on: ubuntu-latest
    name: Performance Checks

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check file sizes
        run: |
          echo "Checking file sizes..."
          echo "HTML size: $(wc -c < index.html) bytes"
          echo "CSS size: $(wc -c < styles.css) bytes"
          echo "JS size: $(wc -c < script.js) bytes"
          
          # Warn if files are too large
          html_size=$(wc -c < index.html)
          css_size=$(wc -c < styles.css)
          js_size=$(wc -c < script.js)
          
          if [ "$html_size" -gt 50000 ]; then
            echo "⚠ HTML file is larger than 50KB"
          fi
          if [ "$css_size" -gt 100000 ]; then
            echo "⚠ CSS file is larger than 100KB"
          fi
          if [ "$js_size" -gt 100000 ]; then
            echo "⚠ JavaScript file is larger than 100KB"
          fi

      - name: Check for external resources
        run: |
          echo "Checking for external resource optimization..."
          # Count external requests
          external_count=$(grep -o 'https://' index.html | wc -l)
          echo "Found $external_count external resources"
          if [ "$external_count" -gt 5 ]; then
            echo "⚠ Consider reducing external resources for better performance"
          fi

  build:
    runs-on: ubuntu-latest
    name: Build and Deploy
    needs: [validate, accessibility, performance]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v2
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v3

  notify:
    runs-on: ubuntu-latest
    name: Notify Deployment Status
    needs: build
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deployment Status
        run: |
          if [ "${{ needs.build.result }}" == "success" ]; then
            echo "✅ Portfolio successfully deployed!"
            echo "🌐 View at: https://devadarshinilakshman.github.io/portfoliov2/"
          else
            echo "❌ Deployment failed"
            exit 1
          fi

      - name: Summary
        run: |
          echo "### 📊 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status**: ${{ needs.build.result }}" >> $GITHUB_STEP_SUMMARY
          echo "**Timestamp**: $(date)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### Files Deployed:" >> $GITHUB_STEP_SUMMARY
          echo "- index.html" >> $GITHUB_STEP_SUMMARY
          echo "- styles.css" >> $GITHUB_STEP_SUMMARY
          echo "- script.js" >> $GITHUB_STEP_SUMMARY
          echo "- README.md" >> $GITHUB_STEP_SUMMARY
